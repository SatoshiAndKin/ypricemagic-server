name: CI

on:
  push:
    branches: [main, release-please--branches--main]
    paths-ignore:
      - "**.md"
      - "**.png"
      - ".factory/validation/**"
      - "docs/**"
      - "runbooks/**"
      - "*.json"  # release-please-config, etc.
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lockfile:
    # Only check on PRs; push-to-main skips this because git deps (ypricemagic@master)
    # can resolve to a newer commit between lockfile generation and the check.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Check lockfile is up to date
        run: uv lock --check

  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run ruff lint
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy src/

      - name: Check unused dependencies
        run: uv run deptry .

      - name: Run tests with coverage
        run: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=60
