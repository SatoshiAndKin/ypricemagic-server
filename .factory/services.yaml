commands:
  test: uv run pytest -x -q --tb=short
  test-coverage: uv run pytest --cov=src --cov-report=term-missing
  lint: uv run ruff check .
  format: uv run ruff format .
  format-check: uv run ruff format --check .
  typecheck: uv run mypy src/
  sync: uv sync --extra dev

services:
  docker-compose:
    start: cd /Users/bryan/code/ypricemagic-server && docker compose up -d
    stop: cd /Users/bryan/code/ypricemagic-server && docker compose down
    healthcheck: curl -sf http://localhost:8000/ethereum/health
    port: 8000
    depends_on: []
