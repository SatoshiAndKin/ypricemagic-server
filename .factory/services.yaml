commands:
  install: uv sync
  test: uv run pytest src/tests/ -x -q
  test_params: uv run pytest src/tests/test_params.py -x -q
  test_server: uv run pytest src/tests/test_server.py -x -q
  lint: uv run ruff check src/
  format: uv run ruff format src/
  format_check: uv run ruff format --check src/
  typecheck: uv run mypy src/
