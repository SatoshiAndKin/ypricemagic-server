# Development: ethereum only via docker compose up
services:
  nginx:
    image: nginx:alpine
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      ypm-ethereum:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s

  ypm-ethereum:
    image: ghcr.io/satoshiandkin/ypricemagic-server:latest
    build: .
    init: true
    environment:
      CHAIN_NAME: ethereum
      CHAIN_ID: 1
      RPC_URL: ${RPC_URL_ETHEREUM}
      ETHERSCAN_TOKEN: ${ETHERSCAN_TOKEN}
    volumes:
      - cache-ethereum:/data/cache
      - brownie-ethereum:/root/.brownie
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    stop_grace_period: 30s

volumes:
  cache-ethereum:
  brownie-ethereum:
