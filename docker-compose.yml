networks:
  proxy:
    name: ypm-proxy

services:
  traefik:
    image: traefik:v3.2
    container_name: traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=ypm-proxy"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=false"
      - "--ping=true"
    ports:
      - "${PORT:-8000}:80"
    networks:
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  ypm-ethereum:
    image: ghcr.io/satoshiandkin/ypricemagic-server:latest
    build: .
    init: true
    environment:
      CHAIN_NAME: ethereum
      CHAIN_ID: 1
      RPC_URL: ${RPC_URL_ETHEREUM}
      ETHERSCAN_TOKEN: ${ETHERSCAN_TOKEN}
    volumes:
      - cache-ethereum:/data/cache
      - brownie-ethereum:/root/.brownie
    healthcheck:
      test: ["CMD-SHELL", "test ! -f /tmp/drain && curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ethereum.rule=PathPrefix(`/ethereum`)"
      - "traefik.http.routers.ethereum.entrypoints=web"
      - "traefik.http.middlewares.strip-ethereum.stripprefix.prefixes=/ethereum"
      - "traefik.http.routers.ethereum.middlewares=strip-ethereum"
      - "traefik.http.services.ethereum.loadbalancer.server.port=8001"
      - "traefik.http.routers.health.rule=Path(`/health`)"
      - "traefik.http.routers.health.entrypoints=web"
      - "traefik.http.routers.health.service=ethereum"
    networks:
      - proxy
    restart: unless-stopped
    stop_grace_period: 30s

  ypm-arbitrum:
    image: ghcr.io/satoshiandkin/ypricemagic-server:latest
    build: .
    init: true
    environment:
      CHAIN_NAME: arbitrum
      CHAIN_ID: 42161
      RPC_URL: ${RPC_URL_ARBITRUM}
      ETHERSCAN_TOKEN: ${ETHERSCAN_TOKEN}
    volumes:
      - cache-arbitrum:/data/cache
      - brownie-arbitrum:/root/.brownie
    healthcheck:
      test: ["CMD-SHELL", "test ! -f /tmp/drain && curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.arbitrum.rule=PathPrefix(`/arbitrum`)"
      - "traefik.http.routers.arbitrum.entrypoints=web"
      - "traefik.http.middlewares.strip-arbitrum.stripprefix.prefixes=/arbitrum"
      - "traefik.http.routers.arbitrum.middlewares=strip-arbitrum"
      - "traefik.http.services.arbitrum.loadbalancer.server.port=8001"
    networks:
      - proxy
    restart: unless-stopped
    stop_grace_period: 30s

  ypm-optimism:
    image: ghcr.io/satoshiandkin/ypricemagic-server:latest
    build: .
    init: true
    environment:
      CHAIN_NAME: optimism
      CHAIN_ID: 10
      RPC_URL: ${RPC_URL_OPTIMISM}
      ETHERSCAN_TOKEN: ${ETHERSCAN_TOKEN}
    volumes:
      - cache-optimism:/data/cache
      - brownie-optimism:/root/.brownie
    healthcheck:
      test: ["CMD-SHELL", "test ! -f /tmp/drain && curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.optimism.rule=PathPrefix(`/optimism`)"
      - "traefik.http.routers.optimism.entrypoints=web"
      - "traefik.http.middlewares.strip-optimism.stripprefix.prefixes=/optimism"
      - "traefik.http.routers.optimism.middlewares=strip-optimism"
      - "traefik.http.services.optimism.loadbalancer.server.port=8001"
    networks:
      - proxy
    restart: unless-stopped
    stop_grace_period: 30s

  ypm-base:
    image: ghcr.io/satoshiandkin/ypricemagic-server:latest
    build: .
    init: true
    environment:
      CHAIN_NAME: base
      CHAIN_ID: 8453
      RPC_URL: ${RPC_URL_BASE}
      ETHERSCAN_TOKEN: ${ETHERSCAN_TOKEN}
    volumes:
      - cache-base:/data/cache
      - brownie-base:/root/.brownie
    healthcheck:
      test: ["CMD-SHELL", "test ! -f /tmp/drain && curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.base.rule=PathPrefix(`/base`)"
      - "traefik.http.routers.base.entrypoints=web"
      - "traefik.http.middlewares.strip-base.stripprefix.prefixes=/base"
      - "traefik.http.routers.base.middlewares=strip-base"
      - "traefik.http.services.base.loadbalancer.server.port=8001"
    networks:
      - proxy
    restart: unless-stopped
    stop_grace_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=8080"
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 30s

volumes:
  cache-ethereum:
  brownie-ethereum:
  cache-arbitrum:
  brownie-arbitrum:
  cache-optimism:
  brownie-optimism:
  cache-base:
  brownie-base:
