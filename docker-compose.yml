networks:
  traefik-proxy:
    external: true
    name: traefik-proxy

x-ypm-service: &ypm-service
  build: .
  init: true
  healthcheck:
    test: ["CMD-SHELL", "test ! -f /tmp/drain && curl -sf http://localhost:8001/health || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s
  networks:
    - traefik-proxy
  restart: unless-stopped
  stop_grace_period: 30s

services:
  ypm-ethereum:
    <<: *ypm-service
    environment:
      CHAIN_NAME: ethereum
      CHAIN_ID: 1
      RPC_URL: ${RPC_URL_ETHEREUM}
      ETHERSCAN_TOKEN: ${ETHERSCAN_TOKEN}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
    volumes:
      - cache-ethereum:/data/cache
      - brownie-ethereum:/root/.brownie
      - solcx:/root/.solcx
      - vvm:/root/.vvm
      - ypricemagic-ethereum:/root/.ypricemagic
      - appcache-ethereum:/app/cache
    labels:
      traefik.enable: "true"
      docker-rollout.pre-stop-hook: "touch /tmp/drain && sleep 10"
      traefik.http.routers.ypm-ethereum.rule: "Host(`${VIRTUAL_HOST:-localhost}`) && PathPrefix(`/ethereum`)"
      traefik.http.routers.ypm-ethereum.entrypoints: web
      traefik.http.middlewares.ypm-strip-ethereum.stripprefix.prefixes: /ethereum
      traefik.http.routers.ypm-ethereum.middlewares: ypm-strip-ethereum
      traefik.http.services.ypm-ethereum.loadbalancer.server.port: "8001"
      traefik.http.routers.ypm-health.rule: "Host(`${VIRTUAL_HOST:-localhost}`) && Path(`/health`)"
      traefik.http.routers.ypm-health.entrypoints: web
      traefik.http.routers.ypm-health.service: ypm-ethereum


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    labels:
      traefik.enable: "true"
      docker-rollout.pre-stop-hook: "touch /tmp/drain && sleep 10"
      traefik.http.routers.ypm-frontend.rule: "Host(`${VIRTUAL_HOST:-localhost}`) && PathPrefix(`/`)"
      traefik.http.routers.ypm-frontend.entrypoints: web
      traefik.http.routers.ypm-frontend.priority: "1"
      traefik.http.services.ypm-frontend.loadbalancer.server.port: "8080"
    networks:
      - traefik-proxy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 30s

volumes:
  cache-ethereum:
  brownie-ethereum:
  solcx:
  vvm:
  ypricemagic-ethereum:
  appcache-ethereum:
