networks:
  traefik-proxy:
    external: true
    name: traefik-proxy

x-ypm-service: &ypm-service
  image: ghcr.io/satoshiandkin/ypricemagic-server:latest
  init: true
  ulimits:
    nofile:
      soft: 65536
      hard: 65536
  healthcheck:
    test: ["CMD-SHELL", "test ! -f /tmp/drain && curl -sf http://localhost:8001/health || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s
  networks:
    - traefik-proxy
  restart: unless-stopped
  stop_grace_period: 320s

services:
  ypm-ethereum:
    <<: *ypm-service
    environment:
      CHAIN_NAME: ethereum
      CHAIN_ID: 1
      RPC_URL: ${RPC_URL_ETHEREUM}
      ETHERSCAN_TOKEN: ${ETHERSCAN_TOKEN}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - cache-ethereum:/data/cache
      - brownie-ethereum:/root/.brownie
      - solcx:/root/.solcx
      - vvm:/root/.vvm
      - ypricemagic-ethereum:/root/.ypricemagic
      - appcache-ethereum:/app/cache
    labels:
      traefik.enable: "true"
      docker-rollout.pre-stop-hook: "touch /tmp/drain && sleep 10"
      traefik.http.routers.ypm-ethereum.rule: "Host(`${VIRTUAL_HOST:-localhost}`) && PathPrefix(`/ethereum`)"
      traefik.http.routers.ypm-ethereum.entrypoints: web
      traefik.http.middlewares.ypm-strip-ethereum.stripprefix.prefixes: /ethereum
      traefik.http.routers.ypm-ethereum.middlewares: ypm-strip-ethereum
      traefik.http.services.ypm-ethereum.loadbalancer.server.port: "8001"
      traefik.http.routers.ypm-health.rule: "Host(`${VIRTUAL_HOST:-localhost}`) && Path(`/health`)"
      traefik.http.routers.ypm-health.entrypoints: web
      traefik.http.routers.ypm-health.service: ypm-ethereum

  ypm-arbitrum:
    <<: *ypm-service
    environment:
      CHAIN_NAME: arbitrum
      CHAIN_ID: 42161
      RPC_URL: ${RPC_URL_ARBITRUM}
