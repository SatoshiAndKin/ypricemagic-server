  frontend:
    image: ghcr.io/satoshiandkin/ypricemagic-server-frontend:latest
    labels:
      traefik.enable: "true"
      docker-rollout.pre-stop-hook: "touch /tmp/drain && sleep 10"
      traefik.http.routers.ypm-frontend.rule: "Host(`${VIRTUAL_HOST:-localhost}`) && !PathPrefix(`/ethereum`) && !PathPrefix(`/arbitrum`) && !PathPrefix(`/optimism`) && !PathPrefix(`/base`) && !PathPrefix(`/bsc`) && !PathPrefix(`/polygon`) && !PathPrefix(`/fantom`) && !PathPrefix(`/health`)"
      traefik.http.routers.ypm-frontend.entrypoints: web
      traefik.http.routers.ypm-frontend.priority: "1"
      traefik.http.services.ypm-frontend.loadbalancer.server.port: "8080"
    networks:
      - traefik-proxy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 30s

